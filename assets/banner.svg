<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="600" viewBox="0 0 1920 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1920" height="600" fill="#1a1512"/>
  
  <!-- Decorative rule -->
  <line x1="120" y1="240" x2="800" y2="240" stroke="#3a322c" stroke-width="2"/>
  
  <!-- Wordmark -->
  <text x="120" y="200" font-family="Georgia, serif" font-size="120" font-weight="400" fill="#E8C39E" letter-spacing="-2">Sideline</text>
  
  <!-- Tagline -->
  <text x="120" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="400" fill="#9a8c7d" letter-spacing="0">
    <tspan x="120" dy="0">The tool that tells independent</tspan>
    <tspan x="120" dy="44">musicians when not to spend.</tspan>
  </text>
  
  <!-- Right side: Three-bar mechanic -->
  <g transform="translate(1200, 180)">
    <!-- ASSESS bar -->
    <rect x="0" y="0" width="500" height="60" fill="#2d2620" rx="4"/>
    <text x="20" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#9a8c7d" letter-spacing="3">ASSESS</text>
    
    <!-- BLOCK bar (accented) -->
    <rect x="0" y="90" width="500" height="60" fill="#8B4A3F" rx="4"/>
    <text x="20" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#1a1512" letter-spacing="3">BLOCK</text>
    
    <!-- REDIRECT bar (accented) -->
    <rect x="0" y="180" width="500" height="60" fill="#E8C39E" rx="4"/>
    <text x="20" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#1a1512" letter-spacing="3">REDIRECT</text>
  </g>
</svg>
